<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="August Type Foundry — Steiner Variable Font" />
		<!-- Global design tokens and reset -->
		<link rel="stylesheet" href="%sveltekit.assets%/css/base.css" />
		<!-- Steiner VF 50 — caps spacing: E/G/S/V/K normalized (V symmetric, all masters) -->
		<style>
			@font-face {
				font-family: 'Steiner';
				src: url('%sveltekit.assets%/fonts/Steiner-VF50.woff2?v=20260622c') format('woff2-variations');
				font-weight: 1 950;
				font-style: normal;
				font-display: swap;
			}

			/* Mokuseki Sans (latest v08) — used by the gQ typeface */
			@font-face {
				font-family: 'Mokuseki Sans';
				src: url('%sveltekit.assets%/fonts/MokusekiSans08-Regular.woff2?v=08') format('woff2');
				font-weight: 400;
				font-style: normal;
				font-display: swap;
			}

			/* Site-wide font: Steiner for all elements (chairman directive) */
			:root {
				--font-en: 'Steiner', 'Helvetica Neue', Arial, sans-serif;
				--font-ja: 'Steiner', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
			}

			html,
			body {
				font-family: 'Steiner', 'Helvetica Neue', Arial, sans-serif;
			}
		</style>

		<!-- Icons -->
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<meta name="theme-color" content="#ffffff" />

		<!-- Open Graph / Twitter (site-wide defaults; pages set their own <title>) -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="August Type Foundry" />
		<meta property="og:title" content="August Type Foundry — Steiner" />
		<meta
			property="og:description"
			content="An independent type foundry from Tokyo. Steiner — a 20-weight neo-humanist variable typeface."
		/>
		<meta property="og:url" content="https://august.tf/" />
		<meta property="og:image" content="https://august.tf/og.png" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="August Type Foundry — Steiner" />
		<meta
			name="twitter:description"
			content="An independent type foundry from Tokyo. Steiner — a 20-weight neo-humanist variable typeface."
		/>
		<meta name="twitter:image" content="https://august.tf/og.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
